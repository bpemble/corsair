name: corsair

services:
  # ── IB Gateway (Paper) ──────────────────────────────────────────────
  # IBC auto-starts IB Gateway and handles the mandatory daily restart.
  # Host networking because IB Gateway binds API socket to IPv6 only.
  ib-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    network_mode: host
    env_file: .env
    # Bare-metal (2026-05-04, i9-13900K hybrid 8P+16E = 24c/32t):
    # P-cores 0 and 3 (logical 0,1,6,7). Gateway is JVM, low-priority,
    # shares with OS housekeeping on P-core 0; P-core 3 is buffer
    # between gateway and the broker/trader cpusets below. Hot
    # services (corsair-broker-rs, trader) get the higher-frequency
    # P-cores. SMT siblings on 13900K are interleaved (CPU 0,1 are
    # the same physical core) so each cpuset value defines distinct
    # physical cores explicitly.
    cpuset: "0,1,6,7"
    command: ["/bin/bash", "/mnt/scripts/gateway_run.sh"]
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      TWS_PORT: "${TWS_PORT:-4002}"
      # Bare-metal cutover 2026-05-02: this host claims the IBKR session,
      # overriding any concurrent gateway. 'primaryoverride' lets the VPS
      # reclaim it during the 7-day rollback window (CLAUDE.md Part 4.4).
      EXISTING_SESSION_DETECTED_ACTION: "${EXISTING_SESSION_DETECTED_ACTION:-primaryoverride}"
    volumes:
      - ib-gateway-data:/opt/ibgateway
      - ./scripts/gateway_run.sh:/mnt/scripts/gateway_run.sh:ro
      - ./scripts/totp_helper.sh:/mnt/scripts/totp_helper.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/${TWS_PORT:-4002}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  # ── Dashboard ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./logs:/app/logs:ro
      - ./logs-paper:/app/logs-paper:ro  # v1.4 §9.5 paper JSONL streams
      - ./data:/app/data:ro
      - ./config:/app/config:ro

  # ── Trader (Rust binary) ────────────────────────────────────────────
  # Reads from the Rust broker's IPC over SHM and places orders against
  # IBKR via the broker. Default-on since the Phase 6.7 cutover
  # (2026-05-02). Reuses the corsair-corsair image (built from the same
  # Dockerfile) but runs the corsair_trader_rust binary.
  trader:
    image: corsair-corsair
    depends_on:
      corsair-broker-rs:
        condition: service_started
    network_mode: host
    env_file: .env
    # Bare-metal (2026-05-04, i9-13900K): P-cores 4 and 5 (logical
    # 8,9,10,11). These two cores are the chip's "preferred" cores
    # at 5.8 GHz boost — the rest of the P-cores run 5.5 GHz. Both
    # tokio workers land on distinct physical cores via SMT-aware
    # pinning in build_pinner: worker 0 → CPU 8 (P-core 4), worker
    # 1 → CPU 10 (P-core 5). Bg runtime takes the SMT sibling of
    # worker 0 (CPU 9) — shared L1/L2, low cross-core wakeup cost.
    # Hot-loop (decision + place_order) runs at 5.8 GHz throughout.
    cpuset: "8,9,10,11"
    mem_reservation: 1g
    cap_add:
      - SYS_NICE
      # IPC_LOCK lets the container call mlockall(MCL_CURRENT|MCL_FUTURE)
      # without hitting the Docker default RLIMIT_MEMLOCK ceiling
      # (~64 KiB). Audit Phase 1 #6 (2026-05-05) — locks all current
      # and future memory pages so the hot path never page-faults.
      - IPC_LOCK
    ulimits:
      # -1 = unlimited; required for mlockall on a multi-MB process.
      memlock: -1
    environment:
      LOG_LEVEL: "${TRADER_LOG_LEVEL:-INFO}"
      # Rust trader requires the SHM transport — no socket fallback
      # (the Python trader's Unix-socket path was retired Phase 6.8a).
      CORSAIR_IPC_TRANSPORT: "shm"
      # Live placement default-on. Set to empty string to disable
      # (trader logs decisions only).
      CORSAIR_TRADER_PLACES_ORDERS: "${CORSAIR_TRADER_PLACES_ORDERS:-1}"
      # Busy-poll the SHM events ring instead of FIFO-wake. Trades 1
      # isolated core hot for ~13 µs IPC latency reduction (CLAUDE.md §17).
      CORSAIR_TRADER_BUSY_POLL: "${CORSAIR_TRADER_BUSY_POLL:-1}"
    volumes:
      - ./logs-paper:/app/logs-paper      # event JSONL output
      - ./data:/app/data                  # IPC ring files live here
    command: ["/usr/local/bin/corsair_trader_rust"]
    restart: unless-stopped

  # ── corsair_broker shadow (v3 Phase 5A) ─────────────────────────────
  # Rust broker daemon running ALONGSIDE the live Python broker for
  # validation + latency measurement. Profile-gated so it only starts
  # when explicitly requested:
  #   docker compose --profile rust-broker up -d corsair-broker-rs
  #
  # Connects to IBKR with clientId=10 (Python broker uses 0). Reads
  # config/runtime_v3.yaml. Publishes its snapshot to
  # data/snapshot_rust.json (separate from Python's hg_chain_snapshot).
  #
  # SHADOW mode (default): no orders placed. Set
  # CORSAIR_BROKER_SHADOW=0 to flip to live (only after Phase 5B IPC
  # work lands; otherwise the trader can't talk to it).
  corsair-broker-rs:
    # Owns the build for the shared `corsair-corsair` image (used by
    # both broker and trader). After the legacy `corsair` service was
    # retired, this service is the canonical build site — rebuild via
    # `docker compose up -d --build corsair-broker-rs`.
    build:
      context: .
      dockerfile: Dockerfile
    image: corsair-corsair
    depends_on:
      ib-gateway:
        condition: service_healthy
    # Host networking — same as corsair + trader. ib-gateway binds the
    # API socket to localhost only, so bridged containers can't reach it.
    network_mode: host
    env_file: .env
    # Bare-metal (2026-05-04, i9-13900K): P-cores 6 and 7 (logical
    # 12,13,14,15) at 5.5 GHz. Cleanly separates the broker from
    # the trader's preferred cores (P-cores 4,5 = CPU 8-11) so the
    # two services don't share cache lines or SMT execution units.
    # 4 tokio workers spread across both physical cores via SMT-
    # aware pinning: workers 0,1 → CPU 12,14 (different P-cores),
    # workers 2,3 → CPU 13,15 (SMT siblings). Owns gateway TCP,
    # IPC server, snapshot writer, vol surface, hedge.
    cpuset: "12,13,14,15"
    # Item 3 (broker cmd_pump perf, 2026-05-05): seccomp adds ~5%
    # overhead per syscall via __seccomp_filter (see perf record on
    # the cmd_pump thread). Broker is in our trusted container running
    # our own code; the seccomp default profile adds little real
    # security here. Trade: looser sandbox for ~5% broker CPU back.
    security_opt:
      - seccomp:unconfined
    mem_reservation: 2g
    cap_add:
      - SYS_NICE
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
      CORSAIR_BROKER_CONFIG: "/app/config/runtime_v3.yaml"
      CORSAIR_BROKER_SHADOW: "${CORSAIR_BROKER_SHADOW:-0}"
      CORSAIR_BROKER_IPC_ENABLED: "${CORSAIR_BROKER_IPC_ENABLED:-1}"
      # Item 5 (broker cmd_pump perf, 2026-05-05): drop tokio worker
      # count from 4→3 so build_pinner assigns workers to [12, 14, 13]
      # (one per physical P-core + 1 SMT sibling) and CPU 15 stays
      # free. cmd_pump's `allowed.last()` then pins to 15 alone, no
      # co-tenancy with productive worker threads. Eliminates the
      # SMT-sibling cache contention between cmd_pump's idle spin
      # and worker N's productive work.
      CORSAIR_BROKER_WORKERS: "${CORSAIR_BROKER_WORKERS:-3}"
      # Busy-poll the trader→broker commands ring. Drops command IPC
      # latency p50 from ~1ms to ~50µs at the cost of 1 CPU core hot.
      # Worth it for a market-maker; bare-metal has cores to spare.
      CORSAIR_BROKER_BUSY_POLL: "${CORSAIR_BROKER_BUSY_POLL:-1}"
    volumes:
      - ./logs:/app/logs
      - ./logs-paper:/app/logs-paper
      - ./data:/app/data
      - ./config:/app/config:ro
    command: ["/usr/local/bin/corsair_broker_rust"]
    # Snapshot freshness as a liveness signal — broker writes
    # /app/data/hg_chain_snapshot.json every 250ms in steady state.
    # If it's >60s old, the periodic_snapshot loop is hung even if
    # the process is still alive. `restart: unless-stopped` will
    # recreate after 3 failures.
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/hg_chain_snapshot.json && test $$(( $$(date +%s) - $$(stat -c %Y /app/data/hg_chain_snapshot.json) )) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped

volumes:
  ib-gateway-data:
